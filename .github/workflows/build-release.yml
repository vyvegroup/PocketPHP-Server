name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create Gradle Wrapper
        run: |
          if [ ! -f gradlew ] || ! [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.5
          fi

      # ====== Download and Bundle PHP 8.3 from Termux ======
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq patchelf file 2>&1 | tail -5
          echo "patchelf version: $(patchelf --version 2>&1 | head -1)"

      - name: Download PHP 8.3 for Android (ARM64 + ARMv7)
        run: |
          set -e

          WORKDIR=/tmp/php-bundle
          rm -rf "$WORKDIR" && mkdir -p "$WORKDIR"
          cd "$WORKDIR"

          BASE_URL="https://packages.termux.dev/apt/termux-main"

          python3 << 'PYEOF'
          import os, sys, subprocess, re, gzip, tarfile, io, lzma

          def download(url, dest, timeout=120):
              r = subprocess.run(["curl", "-fsSL", "--max-time", str(timeout), "-o", dest, url],
                                capture_output=True, text=True)
              if r.returncode != 0:
                  print(f"  FAIL download {url}: {r.stderr.strip()}")
                  return False
              return True

          def extract_deb(deb_path, dest_dir):
              """Extract .deb (ar archive) using pure Python."""
              with open(deb_path, 'rb') as f:
                  magic = f.read(8)
                  if magic != b'!<arch>\n':
                      return False
                  while True:
                      header = f.read(60)
                      if len(header) < 60:
                          break
                      name = header[0:16].decode().strip()
                      size = int(header[48:58].decode().strip())
                      data = f.read(size)
                      if len(data) < size:
                          f.read(1)
                      if name.startswith('data.tar'):
                          try:
                              if name.endswith('.xz'):
                                  data = lzma.decompress(data)
                                  tf = tarfile.open(fileobj=io.BytesIO(data))
                              elif name.endswith('.gz'):
                                  import gzip as gz
                                  data = gz.decompress(data)
                                  tf = tarfile.open(fileobj=io.BytesIO(data))
                              elif name.endswith('.zst'):
                                  import zstandard as zstd
                                  data = zstd.ZstdDecompressor().decompress(data)
                                  tf = tarfile.open(fileobj=io.BytesIO(data))
                              else:
                                  tf = tarfile.open(fileobj=io.BytesIO(data))
                              tf.extractall(dest_dir)
                              tf.close()
                              return True
                          except Exception as e:
                              print(f"    WARN extract {name}: {e}")
                              try:
                                  tf = tarfile.open(fileobj=io.BytesIO(data))
                                  tf.extractall(dest_dir)
                                  tf.close()
                                  return True
                              except:
                                  pass
              return False

          def parse_packages(index_url):
              """Download and parse Termux Packages.gz index."""
              gz_path = "/tmp/pkg_index.gz"
              txt_path = "/tmp/pkg_index.txt"
              if not download(index_url, gz_path, 60):
                  print(f"FATAL: Cannot download index from {index_url}")
                  sys.exit(1)
              with gzip.open(gz_path, 'rb') as f:
                  content = f.read().decode('utf-8', errors='replace')
              with open(txt_path, 'w') as f:
                  f.write(content)

              pkgs = {}
              current = {}
              for line in content.split('\n'):
                  line = line.rstrip('\r')
                  if line.startswith("Package: "):
                      if current.get("Package"):
                          pkgs[current["Package"]] = current
                      current = {"Package": line[9:]}
                  elif line.startswith("Filename: "):
                      current["Filename"] = line[10:]
                  elif line.startswith("Depends: "):
                      deps_str = line[9:]
                      deps = []
                      for d in deps_str.split(","):
                          d = d.strip()
                          if d:
                              deps.append(d.split()[0])  # take name before version
                      current["Depends"] = deps
                  elif line == "" and current.get("Package"):
                      pkgs[current["Package"]] = current
                      current = {}
              if current.get("Package"):
                  pkgs[current["Package"]] = current
              return pkgs

          def resolve_all(pkg_name, pkgs, resolved, visited=None):
              if visited is None:
                  visited = set()
              if pkg_name in visited:
                  return
              visited.add(pkg_name)
              pkg = pkgs.get(pkg_name)
              if not pkg:
                  print(f"  SKIP (not found): {pkg_name}")
                  return
              for dep in pkg.get("Depends", []):
                  resolve_all(dep, pkgs, resolved, visited)
              resolved.append(pkg_name)

          def collect_files(src_dir, bin_out, lib_out, arch):
              """Collect PHP binary and ALL .so files from extracted packages."""
              php_found = False
              so_count = 0

              for root, dirs, files in os.walk(src_dir):
                  for fname in files:
                      fpath = os.path.join(root, fname)
                      if fname == "php" and os.path.isfile(fpath) and os.access(fpath, os.R_OK):
                          import shutil
                          shutil.copy2(fpath, os.path.join(bin_out, "php"))
                          os.chmod(os.path.join(bin_out, "php"), 0o755)
                          php_found = True
                          print(f"    PHP binary: {os.path.getsize(fpath)//1024}KB from {fpath}")
                      elif fname.endswith(".so") or fname.endswith(".so.0") or fname.endswith(".so.1") or fname.endswith(".so.2") or fname.endswith(".so.3") or fname.endswith(".so.4"):
                          import shutil
                          dest = os.path.join(lib_out, fname)
                          if not os.path.exists(dest):
                              shutil.copy2(fpath, dest)
                              so_count += 1

              return php_found, so_count

          BASE_URL = "https://packages.termux.dev/apt/termux-main"

          architectures = [
              {"termux": "aarch64", "asset": "arm64", "linker": "/system/bin/linker64"},
              {"termux": "arm", "asset": "arm", "linker": "/system/bin/linker"},
          ]

          for arch_info in architectures:
              arch = arch_info["termux"]
              asset_name = arch_info["asset"]
              linker = arch_info["linker"]

              print(f"\n{'='*60}")
              print(f"=== Building PHP for {asset_name} ({arch}) ===")
              print(f"{'='*60}")

              index_url = f"{BASE_URL}/dists/stable/main/binary-{arch}/Packages.gz"
              pkgs = parse_packages(index_url)
              print(f"  Index: {len(pkgs)} packages")

              # Resolve all dependencies
              order = []
              resolve_all("php", pkgs, order)
              print(f"  Dependencies resolved: {len(order)} packages")

              # Download packages
              os.makedirs(f"debs_{arch}", exist_ok=True)
              dl_ok = 0
              dl_fail = 0
              for pkg_name in order:
                  pkg = pkgs.get(pkg_name)
                  if not pkg or "Filename" not in pkg:
                      continue
                  url = f"{BASE_URL}/{pkg['Filename']}"
                  deb_name = pkg["Filename"].split("/")[-1]
                  dest = f"debs_{arch}/{deb_name}"
                  if os.path.isfile(dest) and os.path.getsize(dest) > 100:
                      dl_ok += 1
                      continue
                  if download(url, dest, 120):
                      dl_ok += 1
                  else:
                      dl_fail += 1
              print(f"  Downloaded: {dl_ok} OK, {dl_fail} FAIL")

              # Extract all packages
              src_dir = f"src_{arch}"
              os.makedirs(src_dir, exist_ok=True)
              ext_ok = 0
              for deb in sorted(os.listdir(f"debs_{arch}")):
                  if not deb.endswith(".deb"):
                      continue
                  if extract_deb(f"debs_{arch}/{deb}", src_dir):
                      ext_ok += 1
              print(f"  Extracted: {ext_ok} packages")

              # Collect binary and libraries
              asset_php = os.path.join(os.environ.get("GITHUB_WORKSPACE", "/tmp"),
                                        "app/src/main/assets/php", asset_name)
              bin_dir = os.path.join(asset_php, "bin")
              lib_dir = os.path.join(asset_php, "lib")
              os.makedirs(bin_dir, exist_ok=True)
              os.makedirs(lib_dir, exist_ok=True)

              php_found, so_count = collect_files(src_dir, bin_dir, lib_dir, arch)
              print(f"  PHP binary found: {php_found}")
              print(f"  .so files collected: {so_count}")

              if not php_found:
                  print(f"  ERROR: PHP binary not found! Listing files:")
                  for root, dirs, files in os.walk(src_dir):
                      for f in files:
                          if "php" in f.lower():
                              print(f"    {os.path.join(root, f)}")

              # Patch binary with patchelf
              php_bin = os.path.join(bin_dir, "php")
              if php_found and os.path.isfile(php_bin):
                  import shutil
                  # Verify ELF
                  result = subprocess.run(["file", php_bin], capture_output=True, text=True)
                  print(f"  File type: {result.stdout.strip()}")

                  # Set RPATH (use --force-rpath for ELF RPATH instead of RUNPATH)
                  r1 = subprocess.run(["patchelf", "--set-rpath", "$ORIGIN/../lib",
                                       "--force-rpath", php_bin],
                                      capture_output=True, text=True)
                  if r1.returncode == 0:
                      print(f"  RPATH set: $ORIGIN/../lib")
                  else:
                      print(f"  RPATH FAILED: {r1.stderr.strip()}")

                  # Set interpreter
                  r2 = subprocess.run(["patchelf", "--set-interpreter", linker, php_bin],
                                      capture_output=True, text=True)
                  if r2.returncode == 0:
                      print(f"  Interpreter set: {linker}")
                  else:
                      print(f"  Interpreter FAILED: {r2.stderr.strip()}")

                  # Verify
                  result = subprocess.run(["patchelf", "--print-rpath", php_bin],
                                        capture_output=True, text=True)
                  print(f"  RPATH verify: {result.stdout.strip()}")
                  result = subprocess.run(["patchelf", "--print-interpreter", php_bin],
                                        capture_output=True, text=True)
                  print(f"  Interpreter verify: {result.stdout.strip()}")

                  # Also patch all .so files to fix their rpath
                  patched_so = 0
                  for so_file in os.listdir(lib_dir):
                      so_path = os.path.join(lib_dir, so_file)
                      if not os.path.isfile(so_path):
                          continue
                      # Check if it's an ELF file
                      fr = subprocess.run(["file", so_path], capture_output=True, text=True)
                      if "ELF" in fr.stdout:
                          pr = subprocess.run(["patchelf", "--set-rpath", "$ORIGIN",
                                             "--force-rpath", so_path],
                                            capture_output=True, text=True)
                          if pr.returncode == 0:
                              patched_so += 1
                  print(f"  Patched {patched_so} .so files")

                  size_mb = os.path.getsize(php_bin) / (1024*1024)
                  total_lib_mb = sum(os.path.getsize(os.path.join(lib_dir, f))
                                    for f in os.listdir(lib_dir)) / (1024*1024)
                  print(f"  Total: PHP {size_mb:.1f}MB + libs {total_lib_mb:.1f}MB = {size_mb+total_lib_mb:.1f}MB")
              else:
                  print(f"FATAL: PHP binary not found for {asset_name}!")
                  sys.exit(1)

          print(f"\n{'='*60}")
          print("=== PHP Bundle Complete ===")
          print(f"{'='*60}")
          PYEOF

      - name: Verify PHP bundle
        run: |
          echo "=== ARM64 ==="
          ls -la app/src/main/assets/php/arm64/bin/php 2>/dev/null || echo "MISSING!"
          echo "Lib count: $(ls app/src/main/assets/php/arm64/lib/ 2>/dev/null | wc -l)"
          echo "Total size: $(du -sh app/src/main/assets/php/arm64/ 2>/dev/null | cut -f1)"

          echo ""
          echo "=== ARM (ARMv7) ==="
          ls -la app/src/main/assets/php/arm/bin/php 2>/dev/null || echo "MISSING!"
          echo "Lib count: $(ls app/src/main/assets/php/arm/lib/ 2>/dev/null | wc -l)"
          echo "Total size: $(du -sh app/src/main/assets/php/arm/ 2>/dev/null | cut -f1)"

          # Fail if ARM64 PHP is missing (most important)
          if [ ! -f app/src/main/assets/php/arm64/bin/php ]; then
            echo "ERROR: ARM64 PHP binary missing!"
            exit 1
          fi

      - name: Generate keystore for signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          fi
          if [ ! -s release.keystore ]; then
            keytool -genkeypair -v \
              -keystore release.keystore \
              -alias pocketphp \
              -keyalg RSA -keysize 4096 -validity 10000 \
              -storepass pocketphp123 -keypass pocketphp123 \
              -dname "CN=PocketPHP, OU=Dev, O=PocketPHP, L=Unknown, ST=Unknown, C=US"
          fi
          ls -la release.keystore

      - name: Build Release APK (Signed v1+v2+v3)
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: pocketphp123
          KEY_ALIAS: pocketphp
          KEY_PASSWORD: pocketphp123
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "=== APK Info ==="
          ls -la "$APK_PATH"
          echo "Size: $(du -h $APK_PATH | cut -f1)"
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)
          $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK_PATH" || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketphp-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: pocketphp-release-apk
          path: ./release-apk

      - name: Get version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v1.1.0-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          APK_PATH=$(find ./release-apk -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK: $(du -h $APK_PATH | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "PocketPHP ${{ steps.version.outputs.version }}"
          body: |
            ## PocketPHP Server ${{ steps.version.outputs.version }}

            ### Features
            - **PHP 8.3** on Android localhost (no VPS needed)
            - Supports **ARM64** and **ARMv7** devices
            - Built-in Router: `/{controller}/{action}/{id}` - no .htaccess needed
            - **Cloudflare Quick Tunnel** - free, no account
            - **Ngrok Tunnel** - free tier, optional authtoken
            - **In-app WebView** - browse without opening external browser
            - **File Browser** - create, edit, delete PHP files
            - Full **Material 3** design
            - APK signed **v1 + v2 + v3**

            ### First-Time Setup
            1. Install APK on Android
            2. Open PocketPHP
            3. Tap **"Install PHP 8.3"** (extracts bundled runtime ~30MB)
            4. Tap **Start** to run the server
            5. Use the **Browser** tab to view your site

            ### Router Examples
            | URL | Target | Parameters |
            |-----|--------|------------|
            | `/users/profile/123` | `index.php` | controller=users, action=profile, id=123 |
            | `/api/posts` | `api/index.php` | resource=posts |
            | `/about` | `about.php` | file-based |
          files: ${{ steps.version.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
