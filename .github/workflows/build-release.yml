name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create Gradle Wrapper
        run: |
          if [ ! -f gradlew ] || ! [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.5
          fi

      # ====== Download and Bundle PHP from Termux ======
      - name: Download PHP (ARM64) from Termux
        env:
          TERMUX_INDEX: "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages.gz"
        run: |
          sudo apt-get install -y xz-utils zstd patchelf python3-zstandard 2>/dev/null || true
          
          WORKDIR=/tmp/php-build
          rm -rf "$WORKDIR" && mkdir -p "$WORKDIR"/{tmp,bin,lib}
          cd "$WORKDIR"
          BASE_URL="https://packages.termux.dev/apt/termux-main"
          
          echo "=== Resolving PHP packages from Termux index ==="
          
          # Download and parse the package index
          curl -fsSL --max-time 60 "$TERMUX_INDEX" | gunzip > packages.txt 2>/dev/null
          
          # Python script to resolve deps, download and extract
          python3 << 'PYEOF'
          import os, re, subprocess, sys, tarfile, io, struct, gzip, zlib, lzma
          
          def parse_packages(idx_file):
              pkgs = {}
              current = {}
              with open(idx_file) as f:
                  for line in f:
                      line = line.rstrip()
                      if line.startswith("Package: "):
                          current = {"Package": line[9:]}
                      elif line.startswith("Filename: "):
                          current["Filename"] = line[10:]
                      elif line.startswith("Depends: "):
                          deps = line[9:]
                          current["Depends"] = [d.strip().split()[0] for d in deps.split(",")]
                      elif line == "" and current.get("Package"):
                          pkgs[current["Package"]] = current
                          current = {}
                  if current.get("Package"):
                      pkgs[current["Package"]] = current
              return pkgs
          
          def resolve_deps(pkg_name, pkgs, resolved, visited=None):
              if visited is None:
                  visited = set()
              if pkg_name in resolved or pkg_name in visited:
                  return
              visited.add(pkg_name)
              pkg = pkgs.get(pkg_name)
              if not pkg:
                  print(f"  WARN: Package '{pkg_name}' not found")
                  return
              for dep in pkg.get("Depends", []):
                  resolve_deps(dep, pkgs, resolved, visited)
              resolved.append(pkg_name)
          
          def extract_deb(deb_path, dest_dir):
              """Extract .deb file (ar archive) using pure Python"""
              with open(deb_path, 'rb') as f:
                  magic = f.read(8)
                  if magic != b'!<arch>\n':
                      print(f"    WARN: Not a valid ar archive: {deb_path}")
                      return False
                  
                  members = []
                  while True:
                      header = f.read(60)
                      if len(header) < 60:
                          break
                      name = header[0:16].decode().strip()
                      size_str = header[48:58].decode().strip()
                      size = int(size_str)
                      data = f.read(size)
                      if len(data) < size:
                          f.read(1)  # padding
                      if name in ('data.tar.xz', 'data.tar.gz', 'data.tar.bz2', 'data.tar.zst', 'data.tar.lz4', 'data.tar'):
                          print(f"    Found: {name} ({size} bytes)")
                          try:
                              if name == 'data.tar.xz':
                                  import lzma
                                  tar_data = lzma.decompress(data)
                                  tf = tarfile.open(fileobj=io.BytesIO(tar_data))
                              elif name == 'data.tar.gz':
                                  tar_data = gzip.decompress(data)
                                  tf = tarfile.open(fileobj=io.BytesIO(tar_data))
                              elif name == 'data.tar.bz2':
                                  tar_data = data  # tarfile handles bz2
                                  tf = tarfile.open(fileobj=io.BytesIO(data))
                              elif name == 'data.tar.zst':
                                  import zstandard as zstd
                                  tar_data = zstd.ZstdDecompressor().decompress(data)
                                  tf = tarfile.open(fileobj=io.BytesIO(tar_data))
                              else:
                                  tf = tarfile.open(fileobj=io.BytesIO(data))
                              tf.extractall(dest_dir)
                              tf.close()
                              print(f"    Extracted OK")
                              return True
                          except Exception as e:
                              print(f"    Extract {name} failed: {e}")
                              # Fallback: try as raw tar
                              try:
                                  tf = tarfile.open(fileobj=io.BytesIO(data))
                                  tf.extractall(dest_dir)
                                  tf.close()
                                  print(f"    Fallback raw tar OK")
                                  return True
                              except:
                                  pass
                  return False
          
          pkgs = parse_packages("packages.txt")
          order = []
          resolve_deps("php", pkgs, order)
          print(f"  Packages to download: {len(order)}")
          
          base_url = os.environ.get("BASE_URL")
          os.makedirs("tmp", exist_ok=True)
          
          for pkg_name in order:
              pkg = pkgs.get(pkg_name)
              if not pkg or "Filename" not in pkg:
                  continue
              filename = pkg["Filename"]
              url = f"{base_url}/{filename}"
              dest = f"tmp/{filename.split('/')[-1]}"
              result = subprocess.run(["curl", "-fsSL", "--max-time", "120", "-o", dest, url],
                                    capture_output=True, text=True)
              if result.returncode == 0:
                  size = os.path.getsize(dest)
                  print(f"  DL {filename.split('/')[-1][:40]:40s} {size//1024:5d}KB")
              else:
                  print(f"  FAIL {filename.split('/')[-1][:40]:40s}")
          
          print(f"\n=== Extracting {len([f for f in os.listdir('tmp') if f.endswith('.deb')])} packages ===")
          os.makedirs("src", exist_ok=True)
          for deb in sorted(os.listdir("tmp")):
              if not deb.endswith(".deb"):
                  continue
              print(f"  Extract {deb[:50]:50s}...", end=" ")
              ok = extract_deb(f"tmp/{deb}", "src")
              if ok:
                  print("OK")
              else:
                  print("SKIP")
          
          # Find Termux prefix
          prefix = None
          for root, dirs, files in os.walk("src"):
              if "com.termux" in root and root.endswith("usr"):
                  prefix = root
                  break
          if not prefix:
              for root, dirs, files in os.walk("src"):
                  if "bin/php" in files:
                      prefix = os.path.dirname(os.path.join(root, "bin"))
                      break
          
          print(f"\nPrefix: {prefix}")
          os.makedirs("bin", exist_ok=True)
          os.makedirs("lib", exist_ok=True)
          
          if prefix:
              php_bin = os.path.join(prefix, "bin", "php")
              if os.path.isfile(php_bin):
                  import shutil
                  shutil.copy2(php_bin, "bin/php")
                  os.chmod("bin/php", 0o755)
                  print(f"PHP binary: {os.path.getsize('bin/php')//1024}KB")
              
              lib_dir = os.path.join(prefix, "lib")
              if os.path.isdir(lib_dir):
                  count = 0
                  for f in os.listdir(lib_dir):
                      if f.endswith(".so"):
                          shutil.copy2(os.path.join(lib_dir, f), f"lib/{f}")
                          count += 1
                  print(f"Libraries: {count} files")
          else:
              print("ERROR: No prefix found!")
              for root, dirs, files in os.walk("src", depth=4):
                  for f in files[:20]:
                      print(f"  {os.path.join(root, f)}")
          PYEOF
          
          echo ""
          echo "=== Patching binary ==="
          if [ -f bin/php ] && command -v patchelf &>/dev/null; then
            patchelf --set-rpath '$ORIGIN/../lib' bin/php 2>/dev/null && echo "RPATH set"
            patchelf --set-interpreter '/system/bin/linker64' bin/php 2>/dev/null && echo "Interpreter set"
          fi
          
          echo ""
          echo "=== Copying to APK assets ==="
          ASSET="$GITHUB_WORKSPACE/app/src/main/assets/php"
          mkdir -p "$ASSET/bin" "$ASSET/lib"
          [ -f bin/php ] && cp bin/php "$ASSET/bin/" && chmod +x "$ASSET/bin/php"
          cp lib/*.so "$ASSET/lib/" 2>/dev/null
          echo "PHP binary: $(ls -la $ASSET/bin/php 2>/dev/null | awk '{print $5}')"
          echo "Libraries: $(ls $ASSET/lib/*.so 2>/dev/null | wc -l)"
          echo "Total: $(du -sh $ASSET | cut -f1)"

      - name: Generate keystore for signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          fi
          if [ ! -s release.keystore ]; then
            keytool -genkeypair -v \
              -keystore release.keystore \
              -alias pocketphp \
              -keyalg RSA -keysize 4096 -validity 10000 \
              -storepass pocketphp123 -keypass pocketphp123 \
              -dname "CN=PocketPHP, OU=Dev, O=PocketPHP, L=Unknown, ST=Unknown, C=US"
          fi
          ls -la release.keystore

      - name: Build Release APK (Signed v1+v2+v3)
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: pocketphp123
          KEY_ALIAS: pocketphp
          KEY_PASSWORD: pocketphp123
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "=== APK Info ==="
          ls -la "$APK_PATH"
          echo "Size: $(du -h $APK_PATH | cut -f1)"
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)
          $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK_PATH" || true
          
          # Check PHP is bundled
          echo ""
          echo "=== PHP Bundle Check ==="
          ls -la app/src/main/assets/php/bin/ 2>/dev/null || echo "No PHP bin"
          echo "Lib count: $(ls app/src/main/assets/php/lib/*.so 2>/dev/null | wc -l)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketphp-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: pocketphp-release-apk
          path: ./release-apk

      - name: Get version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v1.0.0-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          APK_PATH=$(find ./release-apk -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK: $(du -h $APK_PATH | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "PocketPHP ${{ steps.version.outputs.version }}"
          body: |
            ## PocketPHP Server ${{ steps.version.outputs.version }}

            ### Features
            - **PHP 8.3** on Android localhost (no VPS needed)
            - Built-in Router: `/{controller}/{action}/{id}` - no .htaccess needed
            - **Cloudflare Quick Tunnel** - free, no account
            - **Ngrok Tunnel** - free tier, optional authtoken
            - **In-app WebView** - browse without opening external browser
            - **File Browser** - create, edit, delete PHP files
            - Full **Material 3** design
            - APK signed **v1 + v2 + v3**

            ### First-Time Setup
            1. Install APK on Android
            2. Open PocketPHP
            3. Tap **"Install PHP 8.3"** (extracts bundled runtime)
            4. Tap **Start** to run the server
            5. Use the **Browser** tab to view your site

            ### Router Examples
            | URL | Target | Parameters |
            |-----|--------|------------|
            | `/users/profile/123` | `index.php` | controller=users, action=profile, id=123 |
            | `/api/posts` | `api/index.php` | resource=posts |
            | `/about` | `about.php` | file-based |
          files: ${{ steps.version.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
