name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create Gradle Wrapper
        run: |
          if [ ! -f gradlew ] || ! [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.5
          fi

      # ====== Download and Bundle PHP 8.3 for Android ======
      - name: Download PHP 8.3 (ARM64) from Termux
        run: |
          sudo apt-get install -y xz-utils zstd patchelf 2>/dev/null || true
          
          WORKDIR=/tmp/php-build
          rm -rf "$WORKDIR" && mkdir -p "$WORKDIR"/{src,tmp,bin,lib}
          cd "$WORKDIR"
          
          ARCH="aarch64"
          TERMUX_REPO="https://packages.termux.dev/apt/termux-main/pool/main"
          
          echo "=== Downloading PHP 8.3 and dependencies ==="
          
          # Function to find and download a package
          download_pkg() {
            local pkg="$1"
            local letter="${pkg:0:1}"
            echo "  -> Looking for $pkg ($ARCH)..."
            
            # Scrape the package directory page
            local page
            page=$(curl -fsSL --max-time 30 "$TERMUX_REPO/$letter/$pkg/" 2>/dev/null)
            if [ -z "$page" ]; then
              echo "     WARNING: Could not fetch package listing for $pkg"
              return 1
            fi
            
            # Find the .deb filename matching our arch
            local deb
            deb=$(echo "$page" | grep -oP "${pkg}_[0-9][^\"_]*_${ARCH}\.deb" | sort -V | tail -1)
            
            if [ -z "$deb" ]; then
              echo "     WARNING: No $deb found for $pkg"
              return 1
            fi
            
            local url="$TERMUX_REPO/$letter/$pkg/$deb"
            echo "     Downloading: $deb"
            curl -fsSL --max-time 120 "$url" -o "tmp/$deb" || {
              echo "     ERROR: Download failed"
              return 1
            }
            echo "     OK: $(du -h tmp/$deb | cut -f1)"
            return 0
          }
          
          # Download essential packages
          download_pkg "libtermux-exec" || true
          download_pkg "libc++" || true
          download_pkg "libandroid-support" || true
          download_pkg "libiconv" || true
          download_pkg "libxml2" || true
          download_pkg "liblzma" || true
          download_pkg "zlib" || true
          download_pkg "openssl" || true
          download_pkg "libsqlite" || true
          download_pkg "bzip2" || true
          download_pkg "libcurl" || true
          download_pkg "oniguruma" || true
          download_pkg "readline" || true
          download_pkg "libffi" || true
          download_pkg "pcre2" || true
          download_pkg "ncurses" || true
          download_pkg "libprotobuf" || true
          download_pkg "php" || true
          
          echo ""
          echo "=== Extracting packages ==="
          
          # Extract all .deb files
          for deb in tmp/*.deb; do
            [ -f "$deb" ] || continue
            echo "  Extracting: $(basename $deb)"
            cd "$WORKDIR/tmp"
            ar x "$(basename $deb)" 2>/dev/null || continue
            
            # Try different tar formats
            if [ -f data.tar.xz ]; then
              tar xJf data.tar.xz -C "$WORKDIR/src" 2>/dev/null && echo "    OK (xz)"
            elif [ -f data.tar.zst ]; then
              zstd -d data.tar.zst -o data.tar 2>/dev/null && tar xf data.tar -C "$WORKDIR/src" 2>/dev/null && echo "    OK (zst)"
            elif [ -f data.tar.gz ]; then
              tar xzf data.tar.gz -C "$WORKDIR/src" 2>/dev/null && echo "    OK (gz)"
            elif [ -f data.tar.bz2 ]; then
              tar xjf data.tar.bz2 -C "$WORKDIR/src" 2>/dev/null && echo "    OK (bz2)"
            elif [ -f data.tar.lz4 ]; then
              lz4 -d data.tar.lz4 data.tar 2>/dev/null && tar xf data.tar -C "$WORKDIR/src" 2>/dev/null && echo "    OK (lz4)"
            else
              tar xf data.tar.* -C "$WORKDIR/src" 2>/dev/null && echo "    OK (auto)"
            fi
            
            rm -f data.tar.* debian-binary control.tar.*
            cd "$WORKDIR"
          done
          
          echo ""
          echo "=== Collecting PHP binary and libraries ==="
          
          # Find the Termux prefix
          TERMUX_PREFIX=$(find src -maxdepth 6 -type d -name "usr" | head -1)
          if [ -z "$TERMUX_PREFIX" ]; then
            echo "WARNING: Could not find Termux prefix, trying alternative..."
            TERMUX_PREFIX=$(find src -maxdepth 6 -type d -path "*/com.termux/*" | head -1)
          fi
          echo "Termux prefix: $TERMUX_PREFIX"
          
          if [ -n "$TERMUX_PREFIX" ]; then
            # Copy PHP binary
            PHP_BIN=$(find "$TERMUX_PREFIX" -name "php" -type f -perm -u+x 2>/dev/null | head -1)
            if [ -n "$PHP_BIN" ]; then
              cp "$PHP_BIN" bin/php
              chmod +x bin/php
              echo "PHP binary: $PHP_BIN ($(du -h bin/php | cut -f1))"
            else
              echo "ERROR: PHP binary not found!"
            fi
            
            # Copy php-cgi if exists
            PHP_CGI=$(find "$TERMUX_PREFIX" -name "php-cgi" -type f -perm -u+x 2>/dev/null | head -1)
            if [ -n "$PHP_CGI" ]; then
              cp "$PHP_CGI" bin/php-cgi
              chmod +x bin/php-cgi
              echo "PHP-CGI: $PHP_CGI ($(du -h bin/php-cgi | cut -f1))"
            fi
            
            # Copy ALL shared libraries (.so files)
            LIB_COUNT=0
            find "$TERMUX_PREFIX" -name "*.so" -type f 2>/dev/null | while read f; do
              cp "$f" lib/
              LIB_COUNT=$((LIB_COUNT + 1))
            done
            echo "Libraries copied: $(ls lib/*.so 2>/dev/null | wc -l) files ($(du -sh lib | cut -f1))"
          else
            echo "ERROR: No Termux prefix found. Checking what was extracted:"
            find src -type f | head -20
          fi
          
          echo ""
          echo "=== Patching PHP binary ==="
          
          if [ -f bin/php ]; then
            # Set RPATH to look for libraries in ../lib relative to the binary
            if command -v patchelf &>/dev/null; then
              CURRENT_RPATH=$(patchelf --print-rpath bin/php 2>/dev/null || echo "none")
              echo "Current RPATH: $CURRENT_RPATH"
              patchelf --set-rpath '$ORIGIN/../lib' bin/php 2>/dev/null && echo "RPATH set to \$ORIGIN/../lib"
              
              # Try to set interpreter to system linker
              CURRENT_INTERP=$(patchelf --print-interpreter bin/php 2>/dev/null || echo "none")
              echo "Current interpreter: $CURRENT_INTERP"
              
              # Use system linker
              patchelf --set-interpreter '/system/bin/linker64' bin/php 2>/dev/null && echo "Interpreter set to /system/bin/linker64"
              
              NEW_RPATH=$(patchelf --print-rpath bin/php 2>/dev/null)
              echo "New RPATH: $NEW_RPATH"
            else
              echo "WARNING: patchelf not available, skipping binary patching"
            fi
          else
            echo "ERROR: PHP binary not found, cannot patch"
          fi
          
          echo ""
          echo "=== Creating asset directories ==="
          
          # Create asset directory structure for the app
          ASSET_PHP_DIR="$GITHUB_WORKSPACE/app/src/main/assets/php"
          mkdir -p "$ASSET_PHP_DIR/bin"
          mkdir -p "$ASSET_PHP_DIR/lib"
          
          # Copy to assets
          if [ -f bin/php ]; then
            cp bin/php "$ASSET_PHP_DIR/bin/"
            chmod +x "$ASSET_PHP_DIR/bin/php"
            echo "Copied php binary to assets"
          fi
          
          # Copy libraries (exclude large unnecessary ones)
          cp lib/*.so "$ASSET_PHP_DIR/lib/" 2>/dev/null
          echo "Copied $(ls $ASSET_PHP_DIR/lib/*.so 2>/dev/null | wc -l) libraries to assets"
          
          echo ""
          echo "=== Summary ==="
          echo "PHP binary: $(ls -la $ASSET_PHP_DIR/bin/php 2>/dev/null | awk '{print $5, $9}')"
          echo "Libraries: $(ls $ASSET_PHP_DIR/lib/*.so 2>/dev/null | wc -l) files"
          echo "Total asset size: $(du -sh $ASSET_PHP_DIR | cut -f1)"

      - name: Generate keystore for signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          fi
          if [ ! -s release.keystore ]; then
            keytool -genkeypair -v \
              -keystore release.keystore \
              -alias pocketphp \
              -keyalg RSA -keysize 4096 -validity 10000 \
              -storepass pocketphp123 -keypass pocketphp123 \
              -dname "CN=PocketPHP, OU=Dev, O=PocketPHP, L=Unknown, ST=Unknown, C=US"
          fi
          ls -la release.keystore

      - name: Build Release APK (Signed v1+v2+v3)
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: pocketphp123
          KEY_ALIAS: pocketphp
          KEY_PASSWORD: pocketphp123
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "=== APK Info ==="
          ls -la "$APK_PATH"
          echo "Size: $(du -h $APK_PATH | cut -f1)"
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)
          $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK_PATH" || true
          
          # Check PHP is bundled
          echo ""
          echo "=== PHP Bundle Check ==="
          ls -la app/src/main/assets/php/bin/ 2>/dev/null || echo "No PHP bin"
          echo "Lib count: $(ls app/src/main/assets/php/lib/*.so 2>/dev/null | wc -l)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketphp-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: pocketphp-release-apk
          path: ./release-apk

      - name: Get version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v1.0.0-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          APK_PATH=$(find ./release-apk -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK: $(du -h $APK_PATH | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "PocketPHP ${{ steps.version.outputs.version }}"
          body: |
            ## PocketPHP Server ${{ steps.version.outputs.version }}

            ### Features
            - **PHP 8.3** on Android localhost (no VPS needed)
            - Built-in Router: `/{controller}/{action}/{id}` - no .htaccess needed
            - **Cloudflare Quick Tunnel** - free, no account
            - **Ngrok Tunnel** - free tier, optional authtoken
            - **In-app WebView** - browse without opening external browser
            - **File Browser** - create, edit, delete PHP files
            - Full **Material 3** design
            - APK signed **v1 + v2 + v3**

            ### First-Time Setup
            1. Install APK on Android
            2. Open PocketPHP
            3. Tap **"Install PHP 8.3"** (extracts bundled runtime)
            4. Tap **Start** to run the server
            5. Use the **Browser** tab to view your site

            ### Router Examples
            | URL | Target | Parameters |
            |-----|--------|------------|
            | `/users/profile/123` | `index.php` | controller=users, action=profile, id=123 |
            | `/api/posts` | `api/index.php` | resource=posts |
            | `/about` | `about.php` | file-based |
          files: ${{ steps.version.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
